name: Build and Release Executable

on:
  push:
    tags:
      - 'v*'  # Executa quando uma tag v1.0, v1.1, etc for criada
  workflow_dispatch:  # Permite executar manualmente

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build executable
      run: |
        pyinstaller --onefile --console --name "instagram_followback" instagram_followback.py
    
    - name: Upload executable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: instagram-followback-windows
        path: dist/instagram_followback.exe
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/instagram_followback.exe
        draft: false
        prerelease: false
        body_path: RELEASE_NOTES.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build executable
      run: |
        pyinstaller --onefile --console --name "instagram_followback" instagram_followback.py
    
    - name: Upload executable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: instagram-followback-linux
        path: dist/instagram_followback

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build executable
      run: |
        pyinstaller --onefile --console --name "instagram_followback" instagram_followback.py
    
    - name: Upload executable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: instagram-followback-macos
        path: dist/instagram_followback